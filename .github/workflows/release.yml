name: Release Kodi Addon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows you to manually trigger this run from the Actions tab

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Metadata
        id: extract_meta
        run: |
          # Robust extraction of version and id from addon.xml
          VERSION=$(grep -oP '(?<=version=")[^"]*' addon.xml | head -n 1)
          ADDON_ID=$(grep -oP '(?<=id=")[^"]*' addon.xml | head -n 1)
          
          # Sanity check to fail early if addon.xml parsing fails
          if [ -z "$VERSION" ] || [ -z "$ADDON_ID" ]; then
            echo "Error: Failed to parse ADDON_ID or VERSION from addon.xml"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ADDON_ID=$ADDON_ID" >> $GITHUB_ENV
          echo "ZIP_NAME=${ADDON_ID}_v${VERSION}.zip" >> $GITHUB_ENV

      - name: Debug Parsed Metadata
        run: |
          echo "Target Addon ID: $ADDON_ID"
          echo "Target Version: $VERSION"
          echo "Output Zip Name: $ZIP_NAME"

      - name: Build Structure
        run: |
          mkdir -p "build/$ADDON_ID"
          rsync -a --exclude='.git' --exclude='.github' --exclude='build' --exclude='zips' . "build/$ADDON_ID/"

      - name: Pack Archive
        run: |
          cd build
          zip -r "../$ZIP_NAME" "$ADDON_ID"
          cd ..

      - name: Output to Local Zips Directory
        run: |
          mkdir -p zips
          cp "$ZIP_NAME" "zips/metadata.anime.otaku.python_v0.9.0.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT }}
          files: |
            ${{ env.ZIP_NAME }}
            zips/metadata.anime.otaku.python_v0.9.0.zip
          draft: false
          prerelease: false
          generate_release_notes: true
