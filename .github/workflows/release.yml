name: Release Kodi Addon

on:
  push:
    branches:
      - main
    tags:
    paths-ignore:
      - 'zips/**'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }} # Required to allow git push later

      - name: Extract Metadata
        id: extract_meta
        run: |
          VERSION=$(grep -oP '(?<=version=")[^"]*' addon.xml | head -n 1)
          ADDON_ID=$(grep -oP '(?<=id=")[^"]*' addon.xml | head -n 1)
          
          if [ -z "$VERSION" ] || [ -z "$ADDON_ID" ]; then
            echo "Error: Failed to parse ADDON_ID or VERSION from addon.xml"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ADDON_ID=$ADDON_ID" >> $GITHUB_ENV
          echo "ZIP_NAME=${ADDON_ID}_v${VERSION}.zip" >> $GITHUB_ENV

      - name: Build Structure
        run: |
          mkdir -p "build/$ADDON_ID"
          rsync -a --exclude='.git' --exclude='.github' --exclude='build' --exclude='zips' . "build/$ADDON_ID/"

      - name: Pack Archive
        run: |
          cd build
          zip -r "../$ZIP_NAME" "$ADDON_ID"
          cd ..

      - name: Output to Local Zips Directory
        run: |
          mkdir -p zips
          cp "$ZIP_NAME" "zips/"

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add zips/
          git commit -m "Automated build: Add release zip for $VERSION" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT }}
          files: |
            ${{ env.ZIP_NAME }}
            zips/${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          tag_name: ${{ github.ref == 'refs/heads/main' && 'dev' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'Development Build' || github.ref_name }}
          generate_release_notes: true
