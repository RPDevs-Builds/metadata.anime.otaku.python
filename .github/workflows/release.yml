name: Release Kodi Addon

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Metadata
        run: |
          VERSION=$(grep -oP '(?<=version=")[^"]*' addon.xml | head -n 1)
          ADDON_ID=$(grep -oP '(?<=id=")[^"]*' addon.xml | head -n 1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ADDON_ID=$ADDON_ID" >> $GITHUB_ENV
          echo "ZIP_NAME=${ADDON_ID}_v${VERSION}.zip" >> $GITHUB_ENV

      - name: Build Structure
        run: |
          mkdir -p build/${{ env.ADDON_ID }}
          rsync -a --exclude='.git' --exclude='.github' --exclude='build' --exclude='zips' . build/${{ env.ADDON_ID }}/

      - name: Pack Archive
        run: |
          cd build
          zip -r ../${{ env.ZIP_NAME }} ${{ env.ADDON_ID }}
          cd ..

      - name: Output to Local Zips Directory
        run: |
          mkdir -p zips
          cp ${{ env.ZIP_NAME }} zips/metadata.anime.otaku.python_v0.9.0.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT }}
          files: |
            ${{ env.ZIP_NAME }}
            zips/metadata.anime.otaku.python_v0.9.0.zip
          draft: false
          prerelease: false
          generate_release_notes: true
