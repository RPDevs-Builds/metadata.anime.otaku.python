name: Release Kodi Addon

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'zips/**'
  workflow_dispatch:

# Cancel any in-progress run for the same ref to prevent queue pile-ups
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Extract Metadata
        id: extract_meta
        run: |
          VERSION=$(grep -oP '<addon[^>]*version="\K[^"]*' addon.xml | head -n 1)
          ADDON_ID=$(grep -oP '<addon[^>]*id="\K[^"]*' addon.xml | head -n 1)

          if [ -z "$VERSION" ] || [ -z "$ADDON_ID" ]; then
            echo "Error: Failed to parse ADDON_ID or VERSION from addon.xml"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ADDON_ID=$ADDON_ID" >> $GITHUB_ENV
          echo "ZIP_NAME=${ADDON_ID}_v${VERSION}.zip" >> $GITHUB_ENV

      - name: Build Structure
        run: |
          mkdir -p "build/$ADDON_ID"
          rsync -a --exclude='.git' --exclude='.github' --exclude='build' --exclude='zips/' . "build/$ADDON_ID/"

      - name: Pack Archive
        run: |
          cd build
          zip -r "../$ZIP_NAME" "$ADDON_ID" -x "*/zips/*" -x "*/zips/"
          cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT }}
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          generate_release_notes: true
